name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            # Locate project directory dynamically if standard path doesn't exist
            if [ -d "/root/project/Live-Stream" ]; then
              cd /root/project/Live-Stream
            elif [ -d "/root/Live-Stream" ]; then
              cd /root/Live-Stream
            else
              cd "$(find / -name "Live-Stream" -type d 2>/dev/null | head -n 1)"
            fi

            echo "Current Working Directory: $(pwd)"
            git fetch --all
            git reset --hard origin/master
            docker compose down --remove-orphans || true
            docker compose build --no-cache
            docker compose up -d --remove-orphans
