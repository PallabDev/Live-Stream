services:
  cowatch:
    build: .
    container_name: cowatch
    restart: always
    env_file:
      - .env
    volumes:
      - ./sqlite.db:/app/sqlite.db
    labels:
      caddy: watch.pallabdev.in
      caddy.reverse_proxy: "{{upstreams 5678}}"
    networks:
      - default
      - caddy_net

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    environment:
      - MTX_WEBRTC=yes
      - MTX_WEBRTCADDRESS=:8889
      - MTX_WEBRTCENCRYPTION=no
    ports:
      - "8889:8889"
      - "8189:8189/udp"
    networks:
      - default

networks:
  caddy_net:
    external: true
  default:
