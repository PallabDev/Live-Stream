# MediaMTX Configuration File

# Log level
logLevel: info

# Enable RTSP (needed for internal communication with FFmpeg)
rtsp: yes
rtspAddress: 127.0.0.1:8554

# Enable RTMP (bound globally for OBS streaming)
rtmp: yes
rtmpAddress: :1935

# Disable internal HLS (our script generates the actual HLS segments)
hls: no

# Disable WebRTC / WHIP / WHEP (as browser streaming is removed)
webrtc: no

# Enable MediaMTX Control API on localhost (used to kick sessions on Stop Live)
api: yes
apiAddress: 127.0.0.1:9997

# Authentication configuration (delegates validation to Node/Express)
authMethod: http
authHTTPAddress: http://127.0.0.1:5678/api/stream/auth

# Path routing & hooks
paths:
  # Path pattern matching transcoded AAC streams
  "~^(.+)_aac$":
    runOnReady: ""
    runOnNotReady: ""

  # Default fallback path configuration for raw incoming streams
  all:
    runOnReady: /app/node_modules/.bin/tsx /app/src/app/common/scripts/on-publish.ts
